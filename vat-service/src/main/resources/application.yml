server:
  port: 8086

spring:
  application:
    name: vat-service

  datasource:
    url: jdbc:mysql://mysql:3306/vat_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root

  sql:
    init:
      mode: never   # always → never

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
