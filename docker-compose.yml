services:

  mysql:
    image: mysql:8.4
    container_name: blockchain-cafe-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blockchain_cafe
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  menu-service:
    build: ./menu-service
    container_name: menu-service
    depends_on:
      mysql:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    depends_on:
      mysql:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    container_name: payment-service
    depends_on:
      mysql:
        condition: service_healthy

  wallet-service:
    build: ./wallet-service
    container_name: wallet-service
    depends_on:
      mysql:
        condition: service_healthy

  vat-service:
    build: ./vat-service
    container_name: vat-service
    depends_on:
      mysql:
        condition: service_healthy

  blockchain-service:
    build: ./blockchain-service
    container_name: blockchain-service
    depends_on:
      mysql:
        condition: service_healthy

  nfc-bridge-service:
    build: ./nfc-bridge-service
    container_name: nfc-bridge-service
    depends_on:
      mysql:
        condition: service_healthy

  frontend-gateway:
    image: nginx:alpine
    container_name: frontend-gateway
    ports:
      - "8082:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - menu-service
      - order-service
      - payment-service
      - wallet-service
      - vat-service
      - blockchain-service
      - nfc-bridge-service

volumes:
  mysql_data:
