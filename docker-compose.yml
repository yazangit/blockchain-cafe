services:
  mysql:
    image: mysql:8.4
    container_name: blockchain-cafe-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  menu-service:
    build:
      context: ./menu-service
      dockerfile: Dockerfile
    container_name: menu-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8082"

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SPRING_SQL_INIT_MODE: never    # added

  vat-service:
    build:
      context: ./vat-service
      dockerfile: Dockerfile
    container_name: vat-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      SPRING_SQL_INIT_MODE: never    # added

  wallet-service:
    build:
      context: ./wallet-service
      dockerfile: Dockerfile
    container_name: wallet-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8085:8085"

  blockchain-service:
    build:
      context: ./blockchain-service
      dockerfile: Dockerfile
    container_name: blockchain-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8087:8087"

  nfc-bridge-service:
    build:
      context: ./nfc-bridge-service
      dockerfile: Dockerfile
    container_name: nfc-bridge-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8088:8088"

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      - menu-service
      - payment-service
      - vat-service
      - wallet-service
      - blockchain-service
      - nfc-bridge-service
    ports:
      - "8083:8083"
    volumes:                        # added volume for order-service to persist order data
      - order_data:/app/data 

volumes:
  mysql_data:
  order_data: # added volume for order-service to persist order data
