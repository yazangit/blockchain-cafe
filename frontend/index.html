<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Blockchain Café</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:20px}
h1{text-align:center}
.container{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.menu,.cart,.results{background:#1e293b;padding:20px;border-radius:10px}
.item{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
button{border:none;padding:8px 12px;cursor:pointer;color:#000;border-radius:6px}
.add{background:#22c55e}
.pay-private{width:100%;margin-top:20px;padding:10px;font-size:16px;background:#f59e0b}
.pay-business{width:100%;margin-top:10px;padding:10px;font-size:16px;background:#38bdf8}
.error{color:#f87171}
.ok{color:#4ade80}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:bold}
.badge-private{background:#f59e0b;color:#111827}
.badge-business{background:#38bdf8;color:#111827}
</style>
</head>
<body>

<h1>☕ Blockchain Café</h1>

<div class="container">
  <div class="menu">
    <h2>Menu</h2>
    <div id="menu">Loading...</div>
  </div>

  <div class="cart">
    <h2>Cart</h2>
    <div id="cartItems">Cart empty</div>
    <button class="pay-private" onclick="checkout('PRIVATE')">Pay as Private</button>
    <button class="pay-business" onclick="checkout('BUSINESS')">Pay as Business</button>
  </div>
</div>

<div class="results">
  <h2>Results</h2>
  <div id="results">No results yet</div>
</div>

<script>
const API = "http://localhost";
let products = [];
let cart = [];

async function safeJson(url, options) {
  const res = await fetch(url, options);
  const text = await res.text();
  let json = null;
  try { json = JSON.parse(text); } catch (_) {}
  if (!res.ok) throw new Error(`${url} -> ${res.status} ${text}`);
  return json;
}

async function loadMenu() {
  const menuDiv = document.getElementById("menu");
  try {
    const json = await safeJson(`${API}:8082/api/products`);
    products = json.data || [];
    renderMenu();
  } catch (e) {
    console.error(e);
    menuDiv.innerHTML = `<div class="error">Failed to load menu.<br>${e.message}</div>`;
  }
}

function renderMenu() {
  const menuDiv = document.getElementById("menu");
  if (!products.length) {
    menuDiv.innerHTML = `<div class="error">No products returned from backend.</div>`;
    return;
  }

  menuDiv.innerHTML = "";
  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <span>${p.name} (€${p.priceGross})</span>
      <button class="add">Add</button>
    `;
    div.querySelector("button").onclick = () => addToCart(p.id);
    menuDiv.appendChild(div);
  });
}

function addToCart(id) {
  const item = cart.find(i => i.id === id);
  if (item) item.qty++;
  else cart.push({ id, qty: 1 });
  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cartItems");

  if (!cart.length) {
    cartDiv.innerHTML = "Cart empty";
    return;
  }

  cartDiv.innerHTML = "";
  cart.forEach(c => {
    const p = products.find(x => x.id === c.id);
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span>${p ? p.name : c.id} x ${c.qty}</span>`;
    cartDiv.appendChild(div);
  });
}

async function checkout(payerType) {
  const resultsDiv = document.getElementById("results");

  if (!cart.length) {
    alert("Cart empty");
    return;
  }

  const payload = {
    orderId: "order-ui-" + Date.now(),
    items: cart.map(c => ({
      productId: c.id,
      quantity: c.qty
    }))
  };

  try {
    const result = await safeJson(`${API}:8083/api/orders/checkout`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const orderId = result.data.orderId;
    await loadResults(orderId, payerType);
  } catch (e) {
    console.error(e);
    resultsDiv.innerHTML = `<div class="error">Checkout failed.<br>${e.message}</div>`;
  }
}

async function loadResults(orderId, payerType) {
  const div = document.getElementById("results");

  try {
    const [payment, vat, wallets, blockchain] = await Promise.all([
      safeJson(`${API}:8084/api/payments/by-order/${orderId}`),
      safeJson(`${API}:8086/api/vat/records/${orderId}`),
      safeJson(`${API}:8085/api/wallets`),
      safeJson(`${API}:8087/api/blockchain/validate`)
    ]);

    const payerBadge = payerType === "BUSINESS"
      ? `<span class="badge badge-business">BUSINESS</span>`
      : `<span class="badge badge-private">PRIVATE</span>`;

    div.innerHTML = `
      <p class="ok"><b>Order completed</b></p>
      <p><b>Payer Type:</b> ${payerBadge}</p>
      <p><b>Order ID:</b> ${orderId}</p>
      <p><b>Payment ID:</b> ${payment.data.id}</p>
      <p><b>Total:</b> €${vat.data.grossTotal}</p>
      <p><b>Net:</b> €${vat.data.netTotal}</p>
      <p><b>VAT:</b> €${vat.data.totalVat}</p>
      <p><b>Payment Status:</b> ${payment.data.status}</p>
      <p><b>Wallets:</b></p>
      ${wallets.data.map(w => `<p>${w.type}: €${w.balance}</p>`).join("")}
      <p><b>Blockchain valid:</b> ${blockchain.data}</p>
      ${
        payerType === "BUSINESS"
          ? `<p class="ok"><b>Business Mode:</b> Company payment flow shown in the frontend.</p>`
          : `<p class="ok"><b>Private Mode:</b> Standard customer payment flow.</p>`
      }
    `;
  } catch (e) {
    console.error(e);
    div.innerHTML = `<div class="error">Failed to load results.<br>${e.message}</div>`;
  }
}

loadMenu();
</script>

</body>
</html>
