<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Blockchain Café</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:20px}
h1{text-align:center}
.container{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.menu,.cart,.results,.invoices{background:#1e293b;padding:20px;border-radius:10px}
.item{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
button{border:none;padding:8px 12px;cursor:pointer;color:#000;border-radius:6px}
input{width:100%;padding:10px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:#0f172a;color:#fff;box-sizing:border-box;margin-top:8px}
.add{background:#22c55e}
.pay-private{width:100%;margin-top:20px;padding:10px;font-size:16px;background:#f59e0b}
.pay-business{width:100%;margin-top:10px;padding:10px;font-size:16px;background:#38bdf8}
.download-btn{display:inline-block;margin-top:14px;padding:10px 14px;font-size:15px;background:#a78bfa;color:#111827;text-decoration:none;border-radius:8px;font-weight:bold}
.error{color:#f87171}
.ok{color:#4ade80}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:bold}
.badge-private{background:#f59e0b;color:#111827}
.badge-business{background:#38bdf8;color:#111827}
.summary{margin-top:16px;padding:12px;border:1px solid rgba(255,255,255,.12);border-radius:8px}
.invoice-row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.small{opacity:.85;font-size:14px}
.two-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.hidden{display:none}
.section-title{margin-top:16px;margin-bottom:8px;font-size:14px;opacity:.9}
</style>
</head>
<body>

<h1>☕ Blockchain Café</h1>

<div class="container">
  <div class="menu">
    <h2>Menu</h2>
    <div id="menu">Loading...</div>
  </div>

  <div class="cart">
    <h2>Cart</h2>
    <div id="cartItems">Cart empty</div>

    <div id="cartSummary" class="summary">
      <p><b>Items:</b> 0</p>
      <p><b>Total:</b> €0.00</p>
    </div>

    <button class="pay-private" onclick="checkoutPrivate()">Pay as Private</button>
    <button class="pay-business" onclick="toggleBusinessForm()">Pay as Business</button>

    <div id="businessForm" class="hidden">
      <div class="section-title">Business Details</div>
      <input id="companyName" type="text" placeholder="Company Name" />
      <input id="vatId" type="text" placeholder="VAT ID" />
      <button class="pay-business" onclick="checkoutBusiness()">Confirm Business Payment</button>
    </div>
  </div>
</div>

<div class="two-cols">
  <div class="results">
    <h2>Results</h2>
    <div id="results">No results yet</div>
  </div>

  <div class="invoices">
    <h2>Previous Invoices</h2>
    <div id="invoiceHistory">No invoices yet</div>
  </div>
</div>

<script>
const API = "http://localhost";
const INVOICE_STORAGE_KEY = "blockchain_cafe_invoices";

let products = [];
let cart = [];

async function safeJson(url, options) {
  const res = await fetch(url, options);
  const text = await res.text();
  let json = null;
  try { json = JSON.parse(text); } catch (_) {}
  if (!res.ok) throw new Error(`${url} -> ${res.status} ${text}`);
  return json;
}

async function loadMenu() {
  const menuDiv = document.getElementById("menu");
  try {
    const json = await safeJson(`${API}:8082/api/products`);
    products = json.data || [];
    renderMenu();
  } catch (e) {
    console.error(e);
    menuDiv.innerHTML = `<div class="error">Failed to load menu.<br>${e.message}</div>`;
  }
}

function renderMenu() {
  const menuDiv = document.getElementById("menu");
  if (!products.length) {
    menuDiv.innerHTML = `<div class="error">No products returned from backend.</div>`;
    return;
  }

  menuDiv.innerHTML = "";
  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <span>${p.name} (€${Number(p.priceGross).toFixed(2)})</span>
      <button class="add">Add</button>
    `;
    div.querySelector("button").onclick = () => addToCart(p.id);
    menuDiv.appendChild(div);
  });
}

function addToCart(id) {
  const item = cart.find(i => i.id === id);
  if (item) item.qty++;
  else cart.push({ id, qty: 1 });
  renderCart();
}

function calculateCartTotal() {
  return cart.reduce((sum, c) => {
    const p = products.find(x => x.id === c.id);
    if (!p) return sum;
    return sum + (Number(p.priceGross) * c.qty);
  }, 0);
}

function calculateCartItemCount() {
  return cart.reduce((sum, c) => sum + c.qty, 0);
}

function renderCart() {
  const cartDiv = document.getElementById("cartItems");
  const summaryDiv = document.getElementById("cartSummary");

  if (!cart.length) {
    cartDiv.innerHTML = "Cart empty";
    summaryDiv.innerHTML = `
      <p><b>Items:</b> 0</p>
      <p><b>Total:</b> €0.00</p>
    `;
    return;
  }

  cartDiv.innerHTML = "";
  cart.forEach(c => {
    const p = products.find(x => x.id === c.id);
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span>${p ? p.name : c.id} x ${c.qty}</span>`;
    cartDiv.appendChild(div);
  });

  const total = calculateCartTotal();
  const itemCount = calculateCartItemCount();

  summaryDiv.innerHTML = `
    <p><b>Items:</b> ${itemCount}</p>
    <p><b>Total:</b> €${total.toFixed(2)}</p>
  `;
}

function toggleBusinessForm() {
  const form = document.getElementById("businessForm");
  form.classList.toggle("hidden");
}

function loadInvoicesFromStorage() {
  try {
    return JSON.parse(localStorage.getItem(INVOICE_STORAGE_KEY) || "[]");
  } catch {
    return [];
  }
}

function saveInvoiceToStorage(invoice) {
  const invoices = loadInvoicesFromStorage();
  invoices.unshift(invoice);
  localStorage.setItem(INVOICE_STORAGE_KEY, JSON.stringify(invoices.slice(0, 20)));
}

function renderInvoiceHistory() {
  const container = document.getElementById("invoiceHistory");
  const invoices = loadInvoicesFromStorage();

  if (!invoices.length) {
    container.innerHTML = "No invoices yet";
    return;
  }

  container.innerHTML = invoices.map(inv => `
    <div class="invoice-row">
      <p><b>Invoice:</b> ${inv.invoiceNumber || "-"}</p>
      <p><b>Order:</b> ${inv.orderId}</p>
      <p><b>Date:</b> ${inv.date}</p>
      <p><b>Payer:</b> ${inv.payerType}</p>
      ${inv.companyName ? `<p><b>Company:</b> ${inv.companyName}</p>` : ""}
      ${inv.vatId ? `<p><b>VAT ID:</b> ${inv.vatId}</p>` : ""}
      <p><b>Total:</b> €${Number(inv.total).toFixed(2)}</p>
      <p class="small"><b>Payment ID:</b> ${inv.paymentId}</p>
      <a class="download-btn" href="${API}:8083/api/invoices/${inv.orderId}" target="_blank">Download Invoice</a>
    </div>
  `).join("");
}

function checkoutPrivate() {
  checkout("PRIVATE", null);
}

function checkoutBusiness() {
  const companyName = document.getElementById("companyName").value.trim();
  const vatId = document.getElementById("vatId").value.trim();

  if (!companyName) {
    alert("Company Name is required");
    return;
  }

  if (!vatId) {
    alert("VAT ID is required");
    return;
  }

  checkout("BUSINESS", { companyName, vatId });
}

async function checkout(payerType, businessDetails) {
  const resultsDiv = document.getElementById("results");

  if (!cart.length) {
    alert("Cart empty");
    return;
  }

  const payload = {
    orderId: "order-ui-" + Date.now(),
    payerType,
    items: cart.map(c => ({
      productId: c.id,
      quantity: c.qty
    }))
  };

  if (payerType === "BUSINESS") {
    payload.businessDetails = businessDetails;
  }

  try {
    const result = await safeJson(`${API}:8083/api/orders/checkout`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    await loadResults(result.data, payerType, businessDetails);
  } catch (e) {
    console.error(e);
    resultsDiv.innerHTML = `<div class="error">Checkout failed.<br>${e.message}</div>`;
  }
}

async function loadResults(orderData, payerType, businessDetails) {
  const div = document.getElementById("results");
  const orderId = orderData.orderId;

  try {
    const [payment, vat, wallets, blockchain] = await Promise.all([
      safeJson(`${API}:8084/api/payments/by-order/${orderId}`),
      safeJson(`${API}:8086/api/vat/records/${orderId}`),
      safeJson(`${API}:8085/api/wallets`),
      safeJson(`${API}:8087/api/blockchain/validate`)
    ]);

    const payerBadge = payerType === "BUSINESS"
      ? `<span class="badge badge-business">BUSINESS</span>`
      : `<span class="badge badge-private">PRIVATE</span>`;

    div.innerHTML = `
      <p class="ok"><b>Order completed</b></p>
      <p><b>Payer Type:</b> ${payerBadge}</p>
      <p><b>Invoice Number:</b> ${orderData.invoiceNumber || "-"}</p>
      <p><b>Order ID:</b> ${orderId}</p>
      <p><b>Payment ID:</b> ${payment.data.id}</p>
      ${orderData.companyName ? `<p><b>Company:</b> ${orderData.companyName}</p>` : ""}
      ${orderData.vatId ? `<p><b>VAT ID:</b> ${orderData.vatId}</p>` : ""}
      <p><b>Total:</b> €${Number(vat.data.grossTotal).toFixed(2)}</p>
      <p><b>Net:</b> €${Number(vat.data.netTotal).toFixed(2)}</p>
      <p><b>VAT:</b> €${Number(vat.data.totalVat).toFixed(2)}</p>
      <p><b>Payment Status:</b> ${payment.data.status}</p>
      <p><b>Wallets:</b></p>
      ${wallets.data.map(w => `<p>${w.type}: €${Number(w.balance).toFixed(2)}</p>`).join("")}
      <p><b>Blockchain valid:</b> ${blockchain.data}</p>
      <a class="download-btn" href="${API}:8083/api/invoices/${orderId}" target="_blank">Download Invoice PDF</a>
    `;

    const invoice = {
      invoiceNumber: orderData.invoiceNumber || null,
      orderId,
      date: new Date().toLocaleString(),
      payerType: orderData.payerType || payerType,
      companyName: orderData.companyName || businessDetails?.companyName || null,
      vatId: orderData.vatId || businessDetails?.vatId || null,
      total: Number(vat.data.grossTotal),
      paymentId: payment.data.id
    };

    saveInvoiceToStorage(invoice);
    renderInvoiceHistory();

    cart = [];
    renderCart();

    document.getElementById("companyName").value = "";
    document.getElementById("vatId").value = "";
    document.getElementById("businessForm").classList.add("hidden");
  } catch (e) {
    console.error(e);
    div.innerHTML = `<div class="error">Failed to load results.<br>${e.message}</div>`;
  }
}

loadMenu();
renderInvoiceHistory();
renderCart();
</script>

</body>
</html>
