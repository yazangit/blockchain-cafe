server:
  port: 8082

spring:
  application:
    name: menu-service

  datasource:
    url: jdbc:mysql://mysql:3306/menu_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
